name: graspdiffuserx
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.8
  - pip=22.2.2

  # ===== CUDA + Torch (必须匹配 Isaac Gym) =====
  - cudatoolkit=11.3
  - pytorch=1.10.0
  - torchvision=0.11.1
  - torchaudio=0.10.0

  # ===== scientific stack =====
  - numpy=1.21.6
  - scipy=1.7.3
  - matplotlib=3.5.3
  - cffi=1.15.1
  - cython=0.29.32
  - imageio=2.22.0
  - h5py=3.7.0
  - zarr=2.12.0
  - numcodecs=0.10.2

  # ===== training utils =====
  - hydra-core=1.2.0
  - einops=0.4.1
  - tqdm=4.64.1
  - dill=0.3.5.1
  - tensorboard=2.11.2
  - psutil=5.9.2
  - click=8.1.3
  - threadpoolctl=3.1.0

  - pip:
      # ===== RL =====
      - gym==0.21.0
      # - rsl-rl==1.0.2 pip install git+https://github.com/leggedrobotics/rsl_rl.git

      # ===== robomimic =====
      - robomimic==0.2.0

      # ===== diffusion stack =====
      - accelerate==0.13.2
      - datasets==2.6.1
      - diffusers==0.11.1

      # ===== ray =====
      - ray[default,tune]==2.2.0

      # ===== video =====
      - av==10.0.0
      - pytorchvideo==0.1.5
      - imagecodecs==2022.9.26
